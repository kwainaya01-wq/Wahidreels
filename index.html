<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wahid Reels | Sound & Smooth Fix</title>
    <style>
        body { background:#000; color:white; margin:0; font-family:sans-serif; overflow:hidden; }
        /* Smooth Snap Scroll Fix */
        .feed { height:100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; -ms-overflow-style: none; }
        .feed::-webkit-scrollbar { display: none; }
        
        .reel { height:100vh; scroll-snap-align: start; scroll-snap-stop: always; position: relative; background:#000; display:flex; align-items:center; }
        video { width:100%; height:100vh; object-fit: cover; }
        
        .side-bar { position:absolute; right:15px; bottom:100px; display:flex; flex-direction:column; align-items:center; gap:20px; z-index:10; }
        .action-btn { background:none; border:none; color:white; font-size:30px; cursor:pointer; text-align:center; text-shadow: 1px 1px 5px #000; }
        .action-btn span { font-size:12px; display:block; margin-top:5px; }
        .liked { color: #ff3e3e !important; }

        .overlay { position:absolute; bottom:80px; left:15px; z-index:5; text-shadow: 1px 1px 5px #000; pointer-events:none; }
        .nav { position:fixed; bottom:0; width:100%; height:60px; background:rgba(0,0,0,0.9); display:flex; justify-content:space-around; align-items:center; border-top:1px solid #222; z-index:100; }
        
        .big-heart { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%) scale(0); color:white; font-size:80px; transition: 0.3s; pointer-events:none; z-index:20; opacity:0.8; }
        .animate-heart { transform:translate(-50%, -50%) scale(1.5); }
    </style>
</head>
<body>
    <div class="feed" id="feed"></div>
    <div class="nav">
        <a href="index.html" style="text-decoration:none; color:#00f2ea; font-size:25px;">🏠</a>
        <a href="upload.html" style="text-decoration:none; color:white; font-size:25px;">➕</a>
        <a href="profile.html" style="text-decoration:none; color:white; font-size:25px;">👤</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBjnKcmC5ix9A97-mJtX6_I2X5FWOv8uSw", authDomain: "wahidreels-pro.firebaseapp.com", projectId: "wahidreels-pro", storageBucket: "wahidreels-pro.firebasestorage.app", messagingSenderId: "706965907010", appId: "1:706965907010:web:c4aa2f3b807ff7b002efdb" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let myId = "";
        onAuthStateChanged(auth, (user) => { 
            if (!user) { window.location.href = "auth.html"; } else { myId = user.uid; }
        });

        // 🎬 Intersection Observer for Sound Control
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    video.play().catch(() => {}); // Play when visible
                    video.muted = false;
                } else {
                    video.pause(); // Stop when not visible
                    video.currentTime = 0;
                }
            });
        }, { threshold: 0.7 });

        // 🎥 Load Reels
        onSnapshot(query(collection(db, "reels_data"), orderBy("createdAt", "desc")), (snap) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snap.forEach(reeldoc => {
                const d = reeldoc.data();
                const reelId = reeldoc.id;
                const isLiked = d.likes && d.likes.includes(myId);
                const likeCount = d.likes ? d.likes.length : 0;

                const reelDiv = document.createElement('div');
                reelDiv.className = "reel";
                reelDiv.innerHTML = `
                    <video src="${d.videoUrl}" loop playsinline id="vid-${reelId}" muted></video>
                    <div class="big-heart" id="heart-${reelId}">❤️</div>
                    <div class="side-bar">
                        <button class="action-btn ${isLiked ? 'liked' : ''}" id="btn-${reelId}" onclick="toggleLike('${reelId}')">
                            ❤️<span id="count-${reelId}">${likeCount}</span>
                        </button>
                        <button class="action-btn">💬<span>0</span></button>
                    </div>
                    <div class="overlay"><b>@${d.userName}</b><p>${d.caption}</p></div>
                `;

                // ✅ Touch Interaction
                let lastTap = 0;
                reelDiv.addEventListener('touchstart', (e) => {
                    const now = Date.now();
                    const v = document.getElementById(`vid-${reelId}`);
                    if (now - lastTap < 300) {
                        showBigHeart(reelId);
                        if(!btn.classList.contains('liked')) toggleLike(reelId);
                    } else {
                        v.paused ? v.play() : v.pause();
                    }
                    lastTap = now;
                });

                feed.appendChild(reelDiv);
                observer.observe(reelDiv); // Attach sound controller
            });
        });

        // ❤️ Like Function
        window.toggleLike = async (id) => {
            const reelRef = doc(db, "reels_data", id);
            const btn = document.getElementById(`btn-${id}`);
            if (btn.classList.contains('liked')) {
                btn.classList.remove('liked');
                await updateDoc(reelRef, { likes: arrayRemove(myId) });
            } else {
                btn.classList.add('liked');
                await updateDoc(reelRef, { likes: arrayUnion(myId) });
            }
        };

        function showBigHeart(id) {
            const h = document.getElementById(`heart-${id}`);
            h.classList.add('animate-heart');
            setTimeout(() => h.classList.remove('animate-heart'), 800);
        }
    </script>
</body>
</html>
