<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Wahid Reels</title>
    <style>
        body { background:#000; color:white; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
        .auth-box { background:#111; padding:30px; border-radius:20px; border:1px solid #00f2ea; width:85%; text-align:center; }
        input { width:100%; padding:12px; margin:10px 0; border-radius:10px; border:none; background:#222; color:white; box-sizing:border-box; }
        button { width:100%; padding:15px; background:#00f2ea; color:black; border:none; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:10px; }
        .toggle-link { color:#00f2ea; font-size:13px; margin-top:15px; cursor:pointer; display:block; }
    </style>
</head>
<body>

    <div class="auth-box">
        <h2 id="title">Login to Reels 🎥</h2>
        <input type="text" id="user-name" placeholder="Full Name (For Signup only)">
        <input type="email" id="user-email" placeholder="Email Address">
        <input type="password" id="user-pass" placeholder="Password">
        <button id="auth-btn">Login</button>
        <span class="toggle-link" id="toggle-mode">Don't have an account? Signup</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBjnKcmC5ix9A97-mJtX6_I2X5FWOv8uSw", 
            authDomain: "wahidreels-pro.firebaseapp.com", 
            projectId: "wahidreels-pro", 
            storageBucket: "wahidreels-pro.firebasestorage.app", 
            messagingSenderId: "706965907010", 
            appId: "1:706965907010:web:c4aa2f3b807ff7b002efdb" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLogin = true;

        // ✅ Check if user is already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                localStorage.setItem("wahid_user_id", user.uid);
                localStorage.setItem("wahid_user_name", user.displayName || "User");
                window.location.href = "index.html";
            }
        });

        const toggleBtn = document.getElementById('toggle-mode');
        const title = document.getElementById('title');
        const nameInput = document.getElementById('user-name');
        const authBtn = document.getElementById('auth-btn');

        toggleBtn.onclick = () => {
            isLogin = !isLogin;
            title.innerText = isLogin ? "Login to Reels 🎥" : "Create Account ✨";
            authBtn.innerText = isLogin ? "Login" : "Signup";
            nameInput.style.display = isLogin ? "none" : "block";
            toggleBtn.innerText = isLogin ? "Don't have an account? Signup" : "Already have an account? Login";
        };

        nameInput.style.display = "none";

        authBtn.onclick = async () => {
            const email = document.getElementById('user-email').value;
            const pass = document.getElementById('user-pass').value;
            const name = nameInput.value;

            if(!email || !pass) return alert("Please fill all fields!");

            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(res.user, { displayName: name });
                    alert("Signup Success! Welcome.");
                }
            } catch (err) {
                alert("Error: " + err.message);
            }
        };
    </script>
</body>
</html>
