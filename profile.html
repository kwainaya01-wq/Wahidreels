<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Wahid Reels</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; color:white; font-family:sans-serif; padding-bottom:80px; }
        
        /* Top Bar for Logout */
        .top-bar { display: flex; justify-content: flex-end; padding: 15px; }
        .logout-btn { background:#ff0050; color:white; border:none; padding:7px 15px; border-radius:5px; font-weight:bold; cursor:pointer; font-size:12px; z-index: 2000; }

        .header { text-align:center; margin-top: 10px; border-bottom:1px solid #222; padding-bottom: 20px; }
        
        /* DP Box */
        .dp-box { width:110px; height:110px; border-radius:50%; background:#222; margin:0 auto 15px; border:3px solid #00f2ea; overflow:hidden; position:relative; cursor:pointer; }
        .dp-box img { width:100%; height:100%; object-fit:cover; }
        .dp-box .overlay-text { position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.6); font-size:10px; padding:4px 0; color: #fff; }
        
        .u-name { font-size:22px; color:#00f2ea; font-weight:bold; margin-bottom:15px; }
        .stats { display:flex; justify-content:center; gap:30px; margin-bottom:20px; }
        .stats b { display:block; font-size:18px; }
        .stats span { font-size:12px; color:#888; }

        /* Grid */
        .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:2px; }
        .item { aspect-ratio:9/16; background:#111; overflow:hidden; border: 0.1px solid #222; }
        .item video { width:100%; height:100%; object-fit:cover; }

        /* Bottom Nav */
        .nav-bar { position:fixed; bottom:0; width:100%; height:65px; background:#000; display:flex; justify-content:space-around; align-items:center; border-top:1px solid #222; z-index:1000; }
        .nav-item { color:white; text-decoration:none; font-size:24px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="header">
        <label for="dp-input" style="display: inline-block;">
            <div class="dp-box">
                <img id="p-img" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Wahid">
                <div class="overlay-text">EDIT</div>
            </div>
        </label>
        <input type="file" id="dp-input" hidden accept="image/*" onchange="uploadDP(this)">
        
        <div class="u-name" id="p-name">@User</div>
        
        <div class="stats">
            <div><b id="post-count">0</b><span>Posts</span></div>
            <div><b>1.2K</b><span>Followers</span></div>
            <div><b>250</b><span>Following</span></div>
        </div>
    </div>

    <div class="grid" id="p-grid"></div>

    <div class="nav-bar">
        <a href="index.html" class="nav-item">🏠</a>
        <a href="upload.html" class="nav-item">➕</a>
        <a href="#" class="nav-item" style="color:#00f2ea">👤</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBjnKcmC5ix9A97-mJtX6_I2X5FWOv8uSw", 
            authDomain: "wahidreels-pro.firebaseapp.com", 
            projectId: "wahidreels-pro", 
            storageBucket: "wahidreels-pro.firebasestorage.app", 
            messagingSenderId: "706965907010", 
            appId: "1:706965907010:web:c4aa2f3b807ff7b002efdb" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const myId = localStorage.getItem("wahid_user_id");
        if(!myId) window.location.href = "auth.html";

        // DP Change Function
        window.uploadDP = async (input) => {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result;
                document.getElementById('p-img').src = base64;
                await updateDoc(doc(db, "users", myId), { photo: base64 });
                alert("DP Change Ho Gayi! ✨");
            };
            reader.readAsDataURL(file);
        };

        // Logout Function
        window.logout = () => {
            if(confirm("Logout karna hai?")){
                localStorage.clear();
                window.location.href = "auth.html";
            }
        };

        async function load() {
            // User Data (Name & DP)
            const userSnap = await getDoc(doc(db, "users", myId));
            if(userSnap.exists()){
                const userData = userSnap.data();
                document.getElementById('p-name').innerText = "@" + (userData.displayName || "WahidUser");
                if(userData.photo) document.getElementById('p-img').src = userData.photo;
            }

            // Shorts Grid Load
            const q = query(collection(db, "reels_data"), where("userId", "==", myId));
            const snap = await getDocs(q);
            const grid = document.getElementById('p-grid');
            grid.innerHTML = "";
            let count = 0;
            snap.forEach(doc => {
                const data = doc.data();
                grid.innerHTML += `<div class="item"><video src="${data.videoUrl}" muted loop playsinline onclick="this.play()"></video></div>`;
                count++;
            });
            document.getElementById('post-count').innerText = count;
        }
        load();
    </script>
</body>
</html>
