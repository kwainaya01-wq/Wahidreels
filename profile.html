<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Wahid Reels</title>
    <style>
        body { background:#000; color:white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin:0; padding-bottom:80px; }
        
        /* Header Section */
        .profile-header { padding: 20px; border-bottom: 1px solid #262626; }
        .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .dp-container { position: relative; }
        .dp { width: 85px; height: 85px; border-radius: 50%; border: 2px solid #262626; object-fit: cover; }
        
        .stats { display: flex; gap: 20px; text-align: center; flex-grow: 1; justify-content: space-around; }
        .stat-num { font-weight: bold; font-size: 18px; display: block; }
        .stat-label { font-size: 13px; color: #a8a8a8; }

        .bio { text-align: left; padding: 0 20px; margin-bottom: 20px; }
        .user-full-name { font-weight: bold; display: block; margin-bottom: 5px; }
        .user-email { color: #a8a8a8; font-size: 14px; }

        /* Buttons */
        .action-buttons { display: flex; gap: 10px; padding: 0 20px; margin-bottom: 20px; }
        .btn { flex: 1; background: #363636; color: white; border: none; padding: 8px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .logout-btn { background: #ed4956 !important; }

        /* Reels Grid */
        .grid-header { border-top: 1px solid #262626; display: flex; justify-content: center; padding: 10px; }
        .reels-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #121212; position: relative; overflow: hidden; }
        .grid-item video { width: 100%; height: 100%; object-fit: cover; }

        .nav { position:fixed; bottom:0; width:100%; height:60px; background:#000; display:flex; justify-content:space-around; align-items:center; border-top:1px solid #262626; z-index:100; }
        .nav a { color:white; text-decoration:none; font-size:25px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="top-row">
            <div class="dp-container">
                <img id="u-dp" src="https://i.ibb.co/pLp6mB6/wahid-logo.png" class="dp">
            </div>
            <div class="stats">
                <div><span class="stat-num" id="post-count">0</span><span class="stat-label">Posts</span></div>
                <div><span class="stat-num">1.2K</span><span class="stat-label">Followers</span></div>
                <div><span class="stat-num">150</span><span class="stat-label">Following</span></div>
            </div>
        </div>
        <div class="bio">
            <span class="user-full-name" id="u-name">Wahid User</span>
            <span class="user-email" id="u-email">email@example.com</span>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn">Edit Profile</button>
        <button class="btn logout-btn" id="logout-btn">Logout</button>
    </div>

    <div class="grid-header">🎬 MY REELS</div>
    <div class="reels-grid" id="user-reels">
        </div>

    <div class="nav">
        <a href="index.html">🏠</a>
        <a href="upload.html">➕</a>
        <a href="profile.html" style="color:#00f2ea">👤</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBjnKcmC5ix9A97-mJtX6_I2X5FWOv8uSw", authDomain: "wahidreels-pro.firebaseapp.com", projectId: "wahidreels-pro", storageBucket: "wahidreels-pro.firebasestorage.app", messagingSenderId: "706965907010", appId: "1:706965907010:web:c4aa2f3b807ff7b002efdb" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('u-name').innerText = user.displayName || "Wahid User";
                document.getElementById('u-email').innerText = user.email;
                loadUserReels(user.uid);
            } else {
                window.location.href = "auth.html";
            }
        });

        // ✅ Load Only My Reels in Grid
        function loadUserReels(userId) {
            const q = query(collection(db, "reels_data"), where("userId", "==", userId));
            onSnapshot(q, (snap) => {
                const grid = document.getElementById('user-reels');
                const postCount = document.getElementById('post-count');
                grid.innerHTML = "";
                postCount.innerText = snap.size; // Kitni post kiye hain
                
                snap.forEach(doc => {
                    const d = doc.data();
                    grid.innerHTML += `
                        <div class="grid-item">
                            <video src="${d.videoUrl}" muted></video>
                        </div>
                    `;
                });
            });
        }

        // ✅ Logout Logic
        document.getElementById('logout-btn').onclick = () => {
            signOut(auth).then(() => {
                sessionStorage.clear(); // Clear session
                window.location.href = "auth.html";
            });
        };
    </script>
</body>
</html>
